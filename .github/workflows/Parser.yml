name: Parser

# Controls when the action will run.
on:
  # Triggers the workflow on each push event
  push:
    branches:
      - '**' # Trigger on all branches, including names containing '/'
    tags-ignore:
      - '*' # Ignore all tags
  # Triggers the workflow on each pull request event
  pull_request:
    paths:
      - '.contrib/Parser/**'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: parser-db-publishing
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7

      - parallel:
        - name: Database Parser for Retail
          id: Parse-Retail
          timeout-minutes: 5
          continue-on-error: true
          run: |
            cd .contrib/Parser
            "Parser.exe" auto baseconfig=.config/retail/retail.config
          shell: cmd

        - name: Database Parser for Classic Era
          id: Parse-ClassicEra
          timeout-minutes: 5
          continue-on-error: true
          run: |
            cd .contrib/Parser
            "Parser.exe" auto baseconfig=.config/retail/retail.config config=".config/classic/01 - Classic Era.config"
          shell: cmd

        - name: Database Parser for Season of Discovery
          id: Parse-ClassicSoD
          timeout-minutes: 5
          continue-on-error: true
          run: |
            cd .contrib/Parser
            "Parser.exe" auto baseconfig=.config/retail/retail.config config=".config/classic/01 - Classic SOD.config"
          shell: cmd

        - name: Database Parser for The Burning Crusade
          id: Parse-TBC
          timeout-minutes: 5
          continue-on-error: true
          run: |
            cd .contrib/Parser
            "Parser.exe" auto baseconfig=.config/retail/retail.config config=".config/classic/02 - TBC.config"
          shell: cmd

        - name: Database Parser for Wrath of the Lich King
          id: Parse-WOTLK
          timeout-minutes: 5
          continue-on-error: true
          run: |
            cd .contrib/Parser
            "Parser.exe" auto baseconfig=.config/retail/retail.config config=".config/classic/03 - Wrath.config"
          shell: cmd

        - name: Database Parser for Cataclysm
          id: Parse-CATA
          timeout-minutes: 5
          continue-on-error: true
          run: |
            cd .contrib/Parser
            "Parser.exe" auto baseconfig=.config/retail/retail.config config=".config/classic/04 - Cataclysm.config"
          shell: cmd

        - name: Database Parser for Mists of Pandaria
          id: Parse-MOP
          timeout-minutes: 5
          continue-on-error: true
          run: |
            cd .contrib/Parser
            "Parser.exe" auto baseconfig=.config/retail/retail.config config=".config/classic/05 - Mists of Pandaria.config"
          shell: cmd

      - name: Full Success Check
        shell: pwsh
        run: |
          $retail = '${{ steps.Parse-Retail.outcome }}'
          $classicEra = '${{ steps.Parse-ClassicEra.outcome }}'
          $classicSoD = '${{ steps.Parse-ClassicSoD.outcome }}'
          $tbc = '${{ steps.Parse-TBC.outcome }}'
          $wotlk = '${{ steps.Parse-WOTLK.outcome }}'
          $cata = '${{ steps.Parse-CATA.outcome }}'
          $mop = '${{ steps.Parse-MOP.outcome }}'

          Write-Host "Verify all Versions Parsed Successfully..."
          Write-Host "Retail: $retail"
          Write-Host "ClassicEra: $classicEra"
          Write-Host "ClassicSoD: $classicSoD"
          Write-Host "TBC: $tbc"
          Write-Host "WOTLK: $wotlk"
          Write-Host "CATA: $cata"
          Write-Host "MOP: $mop"

          if (
            $retail -eq 'success' -and
            $classicEra -eq 'success' -and
            $classicSoD -eq 'success' -and
            $tbc -eq 'success' -and
            $wotlk -eq 'success' -and
            $cata -eq 'success' -and
            $mop -eq 'success'
          ) {
            Write-Host "✅ All Versions Parsed Successfully"
          } else {
            Write-Host "❌ One or more Parsed Versions Errored"
            exit 1
          }

      - name: Generate DB checksums
        shell: pwsh
        run: |
          $dbRoot = (Resolve-Path 'db').Path
          $manifest = Join-Path $env:RUNNER_TEMP 'db.sha256'

          Get-ChildItem $dbRoot -File -Recurse |
            Sort-Object FullName |
            ForEach-Object {
              $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
              $relativePath = [System.IO.Path]::GetRelativePath($dbRoot, $_.FullName).Replace('\', '/')
              "$hash  $relativePath"
            } |
            Set-Content $manifest -Encoding utf8NoBOM

      - name: Publish public commit-matched DB assets
        if: github.event_name == 'push'
        # Keep the authenticated Actions channel available if release publishing fails.
        continue-on-error: true
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $releaseTag = 'db-artifacts'
          $archive = Join-Path $env:RUNNER_TEMP "db-${{ github.sha }}.zip"
          $publicManifest = Join-Path $env:RUNNER_TEMP "db-${{ github.sha }}.sha256"

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::CreateFromDirectory(
            (Resolve-Path 'db').Path,
            $archive,
            [System.IO.Compression.CompressionLevel]::Optimal,
            $false
          )
          Copy-Item (Join-Path $env:RUNNER_TEMP 'db.sha256') $publicManifest

          gh release view $releaseTag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $releaseTag `
              --repo $env:GITHUB_REPOSITORY `
              --target '${{ github.sha }}' `
              --title 'Commit-matched DB artifacts' `
              --prerelease `
              --notes 'Public, commit-matched DB assets generated by the Parser workflow.'
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

          gh release upload $releaseTag `
            --repo $env:GITHUB_REPOSITORY `
            $archive `
            $publicManifest `
            --clobber
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          # Match the Actions artifact retention period and avoid unbounded assets.
          $cutoff = (Get-Date).ToUniversalTime().AddDays(-7)
          $release = gh api "repos/$env:GITHUB_REPOSITORY/releases/tags/$releaseTag" |
            ConvertFrom-Json
          $pages = gh api --paginate --slurp `
            "repos/$env:GITHUB_REPOSITORY/releases/$($release.id)/assets?per_page=100" |
            ConvertFrom-Json
          foreach ($page in $pages) {
            foreach ($asset in $page) {
              if ([DateTime]::Parse($asset.updated_at).ToUniversalTime() -lt $cutoff) {
                gh api --method DELETE `
                  "repos/$env:GITHUB_REPOSITORY/releases/assets/$($asset.id)"
                if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
              }
            }
          }

      - name: Upload DB artifact
        uses: actions/upload-artifact@v7
        with:
          # Include the source commit so a local checkout can request the exact DB.
          name: db-${{ github.sha }}
          path: db/  # File path to upload
          include-hidden-files: true
          retention-days: 7

      - name: Upload DB checksum artifact
        uses: actions/upload-artifact@v7
        with:
          name: db-${{ github.sha }}-checksums
          path: ${{ runner.temp }}/db.sha256
          retention-days: 7
